<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1020" />
  <title>Nemotron 채팅</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <style>
    :root {
      --bg: #0b1020;
      --panel: #141a2e;
      --panel-2: #1c2440;
      --text: #e8ecf6;
      --muted: #8a93ac;
      --accent: #76b900; /* NVIDIA green */
      --user: #2563eb;
      --danger: #ef4444;
      --radius: 16px;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; margin: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      display: flex; flex-direction: column;
      height: 100dvh;
    }
    header {
      padding: calc(env(safe-area-inset-top) + 10px) 14px 10px;
      background: var(--panel);
      border-bottom: 1px solid #232b47;
      display: flex; align-items: center; gap: 10px;
    }
    header .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 10px var(--accent); }
    header h1 { font-size: 16px; margin: 0; font-weight: 600; flex: 1; }
    header select {
      background: var(--panel-2); color: var(--text); border: 1px solid #2c375c;
      border-radius: 10px; padding: 6px 8px; font-size: 12px;
    }
    header button {
      background: var(--panel-2); color: var(--muted); border: 1px solid #2c375c;
      border-radius: 10px; padding: 6px 10px; font-size: 12px; cursor: pointer;
    }
    #chat {
      flex: 1; overflow-y: auto; padding: 14px;
      display: flex; flex-direction: column; gap: 12px;
      -webkit-overflow-scrolling: touch;
    }
    .row { display: flex; }
    .row.user { justify-content: flex-end; }
    .bubble {
      max-width: 82%; padding: 10px 13px; border-radius: var(--radius);
      line-height: 1.5; font-size: 15px; white-space: pre-wrap; word-break: break-word;
    }
    .row.user .bubble { background: var(--user); border-bottom-right-radius: 4px; }
    .row.bot .bubble { background: var(--panel-2); border-bottom-left-radius: 4px; }
    /* 마크다운 렌더링된 봇 버블 */
    .bubble.md { white-space: normal; }
    .bubble.md > *:first-child { margin-top: 0; }
    .bubble.md > *:last-child { margin-bottom: 0; }
    .bubble.md p { margin: 0 0 8px; }
    .bubble.md h1, .bubble.md h2, .bubble.md h3, .bubble.md h4 { margin: 12px 0 6px; line-height: 1.3; }
    .bubble.md h1 { font-size: 1.25em; } .bubble.md h2 { font-size: 1.15em; }
    .bubble.md h3 { font-size: 1.06em; } .bubble.md h4 { font-size: 1em; }
    .bubble.md ul, .bubble.md ol { margin: 4px 0 8px; padding-left: 20px; }
    .bubble.md li { margin: 2px 0; }
    .bubble.md a { color: var(--accent); text-decoration: underline; word-break: break-all; }
    .bubble.md code { background: #0f1428; border: 1px solid #232b47; border-radius: 5px;
      padding: 1px 5px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.88em; }
    .bubble.md pre { background: #0f1428; border: 1px solid #232b47; border-radius: 10px;
      padding: 10px 12px; overflow-x: auto; margin: 6px 0 8px; }
    .bubble.md pre code { background: none; border: none; padding: 0; display: block;
      white-space: pre; line-height: 1.45; }
    .bubble.md blockquote { border-left: 3px solid var(--accent); margin: 6px 0;
      padding: 2px 0 2px 10px; color: var(--muted); }
    .bubble.md hr { border: none; border-top: 1px solid #2c375c; margin: 10px 0; }
    .bubble.md strong { font-weight: 700; }
    .bubble.md table { border-collapse: collapse; margin: 6px 0; display: block; overflow-x: auto; }
    .bubble.md th, .bubble.md td { border: 1px solid #2c375c; padding: 4px 8px; }
    .think {
      font-size: 12.5px; color: var(--muted); background: #0f1428;
      border: 1px solid #232b47; border-radius: 12px; padding: 8px 10px; margin-bottom: 8px;
      white-space: pre-wrap; max-height: 160px; overflow-y: auto;
    }
    .think summary { cursor: pointer; color: var(--accent); font-weight: 600; margin-bottom: 6px; list-style: none; }
    .think[open] summary::after { content: " ▲"; }
    .think summary::after { content: " ▼"; }
    .empty { color: var(--muted); text-align: center; margin: auto; font-size: 14px; line-height: 1.7; }
    footer {
      padding: 10px 12px calc(env(safe-area-inset-bottom) + 10px);
      background: var(--panel); border-top: 1px solid #232b47;
      display: flex; gap: 8px; align-items: flex-end;
    }
    #input {
      flex: 1; resize: none; max-height: 140px;
      background: var(--panel-2); color: var(--text);
      border: 1px solid #2c375c; border-radius: 14px; padding: 11px 13px;
      font-size: 15px; font-family: inherit; line-height: 1.4;
    }
    #input:focus { outline: none; border-color: var(--accent); }
    #send {
      background: var(--accent); color: #0b1020; border: none; border-radius: 14px;
      width: 46px; height: 46px; font-size: 20px; font-weight: 700; cursor: pointer;
      flex: 0 0 auto; display: flex; align-items: center; justify-content: center;
    }
    #send:disabled { opacity: 0.5; }
    .typing::after { content: "▋"; animation: blink 1s steps(2) infinite; color: var(--accent); }
    @keyframes blink { 50% { opacity: 0; } }
  </style>
</head>
<body>
  <header>
    <span class="dot"></span>
    <h1>Nemotron 채팅</h1>
    <select id="model" title="모델 선택">
      <option value="nvidia/nemotron-3-ultra-550b-a55b">Ultra</option>
      <option value="nvidia/nemotron-3-super-120b-a12b">Super</option>
    </select>
    <button id="reset" title="대화 초기화">초기화</button>
  </header>

  <div id="chat">
    <div class="empty" id="empty">
      NVIDIA Nemotron 과 대화해보세요.<br />무료 API · 대화 내용은 이 기기에만 저장됩니다.
    </div>
  </div>

  <footer>
    <textarea id="input" rows="1" placeholder="메시지를 입력하세요…" autocomplete="off"></textarea>
    <button id="send" title="보내기">➤</button>
  </footer>

  <!-- 오픈소스 마크다운 렌더링: marked(파서) + DOMPurify(XSS 새니타이저), 로컬 vendoring -->
  <script src="/marked.min.js"></script>
  <script src="/purify.min.js"></script>
  <script>
    // marked 로 파싱 후 DOMPurify 로 정제하여 안전한 HTML 생성
    if (window.marked) marked.setOptions({ gfm: true, breaks: true });
    function renderMarkdown(src) {
      if (!src) return "";
      if (!window.marked || !window.DOMPurify) {
        // 라이브러리 로드 실패 시 안전한 평문 폴백
        const d = document.createElement("div");
        d.textContent = src;
        return d.innerHTML;
      }
      return DOMPurify.sanitize(marked.parse(src));
    }

    const chat = document.getElementById("chat");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send");
    const modelSel = document.getElementById("model");
    const resetBtn = document.getElementById("reset");
    const empty = document.getElementById("empty");

    let history = JSON.parse(localStorage.getItem("nemo_history") || "[]");
    let busy = false;

    // 저장된 대화 복원
    if (history.length) { empty.remove(); history.forEach(m => renderBubble(m.role, m.content)); scrollDown(); }

    function save() { localStorage.setItem("nemo_history", JSON.stringify(history)); }
    function scrollDown() { chat.scrollTop = chat.scrollHeight; }

    function renderBubble(role, text) {
      const row = document.createElement("div");
      row.className = "row " + (role === "user" ? "user" : "bot");
      const bubble = document.createElement("div");
      if (role === "user") {
        bubble.className = "bubble";
        bubble.textContent = text;
      } else {
        bubble.className = "bubble md";
        bubble.innerHTML = renderMarkdown(text);
      }
      row.appendChild(bubble);
      chat.appendChild(row);
      return bubble;
    }

    // textarea 자동 높이
    input.addEventListener("input", () => {
      input.style.height = "auto";
      input.style.height = Math.min(input.scrollHeight, 140) + "px";
    });
    // 엔터=전송, 시프트+엔터=줄바꿈 (모바일에선 보통 전송 버튼 사용)
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey && !e.isComposing) { e.preventDefault(); sendMessage(); }
    });
    sendBtn.addEventListener("click", sendMessage);
    resetBtn.addEventListener("click", () => {
      if (!confirm("대화를 모두 지울까요?")) return;
      history = []; save(); chat.innerHTML = ""; chat.appendChild(empty);
    });

    async function sendMessage() {
      const text = input.value.trim();
      if (!text || busy) return;
      empty.remove?.();
      busy = true; sendBtn.disabled = true;

      history.push({ role: "user", content: text });
      renderBubble("user", text);
      input.value = ""; input.style.height = "auto"; save(); scrollDown();

      // 봇 버블 준비
      const botRow = document.createElement("div");
      botRow.className = "row bot";
      const wrap = document.createElement("div");
      const details = document.createElement("details");
      details.className = "think";
      details.style.display = "none";
      const summary = document.createElement("summary");
      summary.textContent = "생각 과정 보기";
      const thinkBody = document.createElement("div");
      details.appendChild(summary); details.appendChild(thinkBody);
      const bubble = document.createElement("div");
      bubble.className = "bubble md typing";
      wrap.appendChild(details); wrap.appendChild(bubble);
      botRow.appendChild(wrap); chat.appendChild(botRow); scrollDown();

      let answer = "", reasoning = "";

      try {
        // 무료 서버(Render)는 절전에서 깨어날 때 502/503을 낸다.
        // 서버가 자는 동안엔 서버측 재시도가 못 도니, 여기서 콜드스타트를 재시도한다.
        let res;
        for (let attempt = 0; attempt < 8; attempt++) {
          res = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ messages: history, model: modelSel.value, thinking: true }),
          });
          if (res.ok && res.body) break;
          if ([502, 503, 504].includes(res.status)) {
            bubble.textContent = "⏳ 서버 깨우는 중… (무료 서버 절전 해제, 최대 1분)";
            await new Promise((r) => setTimeout(r, 6000));
            continue;
          }
          throw new Error("서버 응답 오류 (" + res.status + ")");
        }
        if (!res || !res.ok || !res.body) throw new Error("서버가 깨어나지 못했어요. 잠시 후 다시 보내주세요.");

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const parts = buffer.split("\n\n");
          buffer = parts.pop();
          for (const part of parts) {
            const line = part.trim();
            if (!line.startsWith("data:")) continue;
            const data = JSON.parse(line.slice(5).trim());
            if (data.type === "reasoning") {
              reasoning += data.text;
              details.style.display = "block";
              thinkBody.textContent = reasoning;
            } else if (data.type === "content") {
              answer += data.text;
              bubble.innerHTML = renderMarkdown(answer);
            } else if (data.type === "error") {
              answer += "\n\n⚠️ " + data.text;
              bubble.innerHTML = renderMarkdown(answer);
            }
            scrollDown();
          }
        }
      } catch (err) {
        bubble.innerHTML = renderMarkdown((answer || "") + "\n\n⚠️ " + err.message);
      } finally {
        bubble.classList.remove("typing");
        if (answer) {
          // 정상 응답: 히스토리에 저장
          history.push({ role: "assistant", content: answer });
        } else {
          // 응답/에러 실패: 에러 메시지는 유지하고, 아무것도 없으면 안내 표시.
          // 실패한 user 턴은 히스토리에서 롤백해 정합성 유지(다시 시도 가능).
          if (bubble.innerHTML.trim() === "") {
            const hint = reasoning
              ? "(모델이 생각만 하고 답을 내지 못했어요. '생각 과정 보기'를 확인하거나 다시 시도해 주세요.)"
              : "(응답 없음 — 잠시 후 다시 시도해 주세요. 무료 API 혼잡일 수 있어요.)";
            bubble.textContent = hint;
          }
          history.pop();
        }
        save(); busy = false; sendBtn.disabled = false; scrollDown();
      }
    }

    // 서비스워커 등록 (PWA 설치용)
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js").catch(() => {});
    }
  </script>
</body>
</html>
